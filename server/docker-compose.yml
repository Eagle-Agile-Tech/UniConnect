services:
  db:
    image: pgvector/pgvector:pg16
    container_name: uniconnect_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: uniconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_HOST_PORT:-5434}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uniconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: uniconnect_redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniconnect_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      PRISMA_ENV: docker
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    volumes:
      # Expose ML workspace to the API container so it can write datasets/checkpoints
      # that the `ml` service can read.
      - ./ml:/app/ml
    command: >
      sh -c "until pg_isready -h db -U postgres; do sleep 2; done &&
      cd /app/src &&
      npm run db:generate &&
      npm run db:migrate &&
      npm run dev"

  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: uniconnect_ml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      # run_id_pipeline.py uses /app as project root and imports `ml.*`
      PYTHONPATH: /app
      # Ensure python sync scripts can reach Postgres inside the compose network.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/uniconnect?schema=public
    volumes:
      - ./ml:/app/ml
      - ./src:/app/src
    working_dir: /app

volumes:
  db_data:
  redis_data:
